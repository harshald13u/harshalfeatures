html[data-theme="light"] {

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

}
body::before {

  background:
    radial-gradient(1200px 700px at 85% -10%, rgba(212,166,74,0.045), transparent 60%),

a { color: inherit; text-decoration: none; }

.page {

/* MASTHEAD, same as blog landing */
.masthead {
  display: grid; grid-template-columns: auto 1fr auto; align-items: center;
  gap: 18px;
  padding: max(12px, env(safe-area-inset-top)) 0 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 40px;
  position: sticky; top: 0; z-index: 100; background: var(--bg);
}
@supports ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
  .masthead {
    background: rgba(14, 12, 10, 0.88);
    backdrop-filter: saturate(140%) blur(14px);
    -webkit-backdrop-filter: saturate(140%) blur(14px);
  }
  html[data-theme="light"] .masthead { background: rgba(235, 229, 215, 0.88); }
}
.mast-trail { justify-self: end; text-align: right; font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted); font-weight: 500; white-space: nowrap; }
.mast-trail a { color: var(--muted); transition: color 0.2s ease; }
.mast-trail a:hover { color: var(--accent); }
.mast-meta {
  justify-self: start;
  font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase;
  color: var(--muted); font-weight: 500;
}
.mast-meta a { color: var(--muted); transition: color 0.2s ease; }
.mast-meta a:hover { color: var(--accent); }

.mast-theme-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.04); border: 1px solid var(--rule);
  color: var(--ink-2); cursor: pointer; padding: 0; margin: 0;
  transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
  position: relative; justify-self: end;
}
.mast-theme-toggle::before { content: ""; position: absolute; inset: -6px; display: block; }
.mast-theme-toggle:hover { color: var(--accent); border-color: var(--accent); background: rgba(212,166,74,0.08); transform: translateY(-1px); }
.mast-theme-toggle .icon-sun { display: none; }
html[data-theme="light"] .mast-theme-toggle .icon-sun { display: block; }
html[data-theme="light"] .mast-theme-toggle .icon-moon { display: none; }
html[data-theme="light"] .mast-theme-toggle { background: rgba(26,52,88,0.04); }

/* HERO */
.blog-hero { margin-bottom: 30px; text-align: center; }
.blog-title {
  font-family: 'Inter', sans-serif; font-weight: 800;
  font-size: clamp(44px, 5.6vw, 76px);
  line-height: 0.97; letter-spacing: -0.035em;
  margin: 0 0 16px; color: var(--ink);
}
.blog-sub {
  font-size: 15.5px; color: var(--ink-2); max-width: 620px;
  line-height: 1.5; margin: 0 auto;
}
.tools-divider { margin: 26px 0 32px; border: 0; border-top: 1px solid var(--rule); }

/* GRID */
.posts-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.tool-card {
  display: flex; flex-direction: column;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}
.tool-card:hover {
  transform: translateY(-3px);
  border-color: rgba(212,166,74,0.35);
  box-shadow: 0 18px 40px rgba(0,0,0,0.4);
}
.tool-icon {
  height: 176px;
  background: #0e0c0a;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; color: var(--accent);
  padding: 0;
}
html[data-theme="light"] .tool-icon { background: #ebe5d7; }
.tool-logo-img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.tool-logo-light { display: none; }
html[data-theme="light"] .tool-logo-dark { display: none; }
html[data-theme="light"] .tool-logo-light { display: block; }
.tool-icon-fallback {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: 0.02em;
  color: var(--accent);
}
.tool-body {
  padding: 18px 20px 20px;
  display: flex; flex-direction: column; flex: 1; gap: 10px;
}
.tool-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 1.4px;
  text-transform: uppercase; color: var(--accent);
}
.tool-title {
  font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: 18px; line-height: 1.28; letter-spacing: -0.015em;
  color: var(--ink); margin: 0;
}
.tool-desc {
  font-size: 14px; line-height: 1.55; color: var(--ink-2); margin: 0;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.tool-meta {
  margin-top: auto; padding-top: 14px;
  display: flex; justify-content: flex-end; align-items: center;
  font-size: 11px; color: var(--muted); letter-spacing: 0.6px;
}
.tool-meta .tool-arrow { color: var(--accent); transition: transform 0.2s ease; }
.tool-card:hover .tool-arrow { transform: translateX(3px); }

/* EMPTY STATE */
.blog-empty {
  padding: 80px 32px; text-align: center;
  border: 1px dashed var(--rule); border-radius: 12px;
  background: rgba(21,17,13,0.5);
}
.blog-empty-title {
  font-family: 'Inter', sans-serif; font-weight: 700;
  font-size: 22px; color: var(--ink); margin: 0 0 8px; letter-spacing: -0.01em;
}
.blog-empty-sub { font-size: 14px; color: var(--ink-2); max-width: 440px; margin: 0 auto; }

/* FOOTER */
.blog-footer {
  margin-top: 80px; padding-top: 28px;
  border-top: 1px solid var(--rule);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--muted); letter-spacing: 0.4px;
}
.blog-footer a { color: var(--muted); transition: color 0.2s ease; }
.blog-footer a:hover { color: var(--accent); }

@media (max-width: 960px) {

@media (max-width: 640px) {

  .mast-trail { display: none; }

  .blog-title { font-size: clamp(40px, 11vw, 60px); }
  .blog-sub { font-size: 15px; }
  .posts-grid { grid-template-columns: 1fr; gap: 14px; }
  .tool-icon { height: 168px; }
  .tool-title { font-size: 17px; }
  .tool-body { padding: 18px 18px 20px; }

<script>
(function(){
  function escapeHTML(str){
    return String(str || '').replace(/[&<>"']/g, function(c){
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
    });
  }
  function toolCardHTML(tool){
    var url = tool.url || '#';
    var external = /^https?:\/\//i.test(url);
    var icon = tool.icon ? escapeHTML(tool.icon) : escapeHTML((tool.title || 'Tool').slice(0,1).toUpperCase());
    var logoDark = tool.logoDark ? escapeHTML(tool.logoDark) : '';
    var logoLight = tool.logoLight ? escapeHTML(tool.logoLight) : '';
    var alt = escapeHTML((tool.title || 'Tool') + ' logo');
    var logoHTML = logoDark && logoLight
      ? '<img class="tool-logo-img tool-logo-dark" src="'+logoDark+'" alt="'+alt+'" loading="lazy" decoding="async">' +
        '<img class="tool-logo-img tool-logo-light" src="'+logoLight+'" alt="" loading="lazy" decoding="async" aria-hidden="true">'
      : '<span class="tool-icon-fallback">'+icon+'</span>';
    var tag = tool.tag ? '<div class="tool-tag">'+escapeHTML(tool.tag)+'</div>' : '';
    var attrs = external ? ' target="_blank" rel="noopener"' : '';
    return '<a class="tool-card" href="'+escapeHTML(url)+'"'+attrs+'>' +
      '<div class="tool-icon">'+logoHTML+'</div>' +
      '<div class="tool-body">' +
        tag +
        '<h2 class="tool-title">'+escapeHTML(tool.title || 'Untitled tool')+'</h2>' +
        '<p class="tool-desc">'+escapeHTML(tool.description || '')+'</p>' +
        '<div class="tool-meta"><span class="tool-arrow">Open &rarr;</span></div>' +
      '</div>' +
    '</a>';
  }
  fetch('tools.json?nc=' + Date.now())
    .then(function(r){ return r.ok ? r.json() : { tools: [] }; })
    .then(function(data){
      var tools = (data && data.tools) || [];
      var grid = document.getElementById('toolsGrid');
      if (!tools.length) {
        grid.innerHTML = '<div class="blog-empty"><h2 class="blog-empty-title">Tools coming soon</h2><p class="blog-empty-sub">I&rsquo;m building a set of calculators and market tools. They&rsquo;ll appear here as they go live.</p></div>';
        return;
      }
      grid.innerHTML = tools.map(toolCardHTML).join('');
    })
    .catch(function(){
      document.getElementById('toolsGrid').innerHTML =
        '<div class="blog-empty"><h2 class="blog-empty-title">Tools coming soon</h2><p class="blog-empty-sub">I&rsquo;m building a set of calculators and market tools. They&rsquo;ll appear here as they go live.</p></div>';
    });
})();
</script>
<script>
function toggleBlogTheme(){
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('hd-theme', next); } catch(e) {}
}
</script>
