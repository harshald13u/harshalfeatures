<style>
:root {
  --bg: #0e0c0a;
  --bg-2: #15110d;
  --ink: #ece4d3;
  --ink-2: #c9c0ad;
  --muted: #8a8273;
  --faint: #5a5447;
  --rule: rgba(236,228,211,0.10);
  --rule-soft: rgba(236,228,211,0.06);
  --accent: #d4a64a;
  --accent-soft: rgba(212,166,74,0.08);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: var(--bg); }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--ink-2);
  min-height: 100vh;
  line-height: 1.55;
  font-feature-settings: "ss01", "cv11";
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(1200px 700px at 85% -10%, rgba(212,166,74,0.045), transparent 60%),
    radial-gradient(900px 600px at -5% 105%, rgba(212,166,74,0.025), transparent 60%);
}

.page {
  position: relative; z-index: 1;
  max-width: 1120px;
  margin: 0 auto;
  padding: 28px 56px 72px;
}

/* ============================================================
   MASTHEAD
   ============================================================ */
.masthead {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 56px;
}
.mast-mark {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 500;
  font-size: 17px;
  letter-spacing: -0.2px;
  color: var(--ink);
  font-style: italic;
}
.mast-mark::before {
  content: '';
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  margin-right: 10px;
  vertical-align: 2px;
  animation: pulse 2.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.55; transform: scale(0.85); }
}
.mast-meta {
  font-size: 11px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.mast-meta span + span::before {
  content: '';
  display: inline-block;
  width: 3px; height: 3px;
  background: var(--faint);
  border-radius: 50%;
  margin: 0 12px 3px;
  vertical-align: middle;
}

/* ============================================================
   HERO — header + landscape photo + ticker
   ============================================================ */
.hero {
  margin-bottom: 64px;
  position: relative;
}
.eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.eyebrow::after {
  content: '';
  flex: 1; max-width: 72px;
  height: 1px;
  background: var(--accent);
  opacity: 0.45;
}

.name {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: clamp(54px, 9.2vw, 116px);
  line-height: 0.9;
  letter-spacing: -0.04em;
  margin: 0 0 32px;
  color: var(--ink);
  font-variation-settings: "opsz" 144;
  display: flex;
  flex-wrap: wrap;
  gap: 0 0.22em;
}
.name .word { display: inline-flex; }
.name .ch {
  display: inline-block;
  transition: transform 0.45s cubic-bezier(.2,.7,.2,1), color 0.3s ease;
  will-change: transform;
}
.name .ch:hover {
  color: var(--accent);
  transform: translateY(-6px);
}

.role-block {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 14px 22px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 26px;
}
.role-line {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 21px;
  font-style: italic;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.4;
}
.role-line strong {
  font-style: normal;
  font-weight: 500;
  color: var(--ink);
}
.loc-line {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.loc-line::before {
  content: '';
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  margin-right: 8px;
  vertical-align: 2px;
}

.tagline {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: clamp(19px, 2.1vw, 24px);
  line-height: 1.45;
  color: var(--ink-2);
  max-width: 760px;
  letter-spacing: -0.008em;
  font-style: italic;
  margin: 0 0 40px;
}

/* landscape photo */
.hero-photo {
  margin: 0 0 28px;
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  border-radius: 6px;
  background: #1a1612;
  perspective: 900px;
}
.hero-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 32%;
  display: block;
  filter: contrast(1.04) saturate(0.92);
  transform: translate3d(0, var(--py, 0), 0) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
  transition: transform 0.3s cubic-bezier(.2,.7,.2,1), filter 0.4s ease;
  will-change: transform;
}
.hero-photo:hover img { filter: contrast(1.06) saturate(1); }
.hero-photo::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(14,12,10,0.55) 100%);
  pointer-events: none;
}
.hero-photo-cap {
  position: absolute;
  left: 22px; bottom: 16px;
  font-size: 10.5px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--ink);
  font-weight: 500;
  z-index: 2;
  opacity: 0.85;
}
.hero-photo-cap::before {
  content: '';
  display: inline-block;
  width: 18px; height: 1px;
  background: var(--accent);
  margin-right: 10px;
  vertical-align: 3px;
}

/* ticker — recent features rotate */
.ticker {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 14px 18px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: rgba(21,17,13,0.55);
  font-size: 12.5px;
  overflow: hidden;
}
.ticker-tag {
  font-size: 10px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ticker-tag::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
}
.ticker-rail {
  flex: 1;
  position: relative;
  height: 18px;
  overflow: hidden;
  min-width: 0;
}
.ticker-item {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  font-family: 'Inter', sans-serif;
  color: var(--ink-2);
  white-space: nowrap;
  text-overflow: ellipsis;
  overflow: hidden;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.ticker-item.is-on {
  opacity: 1;
  transform: translateY(0);
}
.ticker-item b {
  font-weight: 600;
  color: var(--ink);
  margin-right: 8px;
}
.ticker-item span {
  color: var(--muted);
  margin-left: 8px;
  font-size: 11px;
  letter-spacing: 0.4px;
}

/* ============================================================
   ABOUT — compact, two-column on desktop
   ============================================================ */
.about {
  display: grid;
  grid-template-columns: 200px minmax(0, 1fr);
  gap: 56px;
  padding: 52px 0 56px;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin-bottom: 72px;
}
.about-side-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.about-side-title {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-weight: 400;
  font-size: 16px;
  line-height: 1.4;
  color: var(--muted);
}
.about-body {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-size: 16.5px;
  line-height: 1.62;
  color: var(--ink-2);
  letter-spacing: -0.002em;
  column-count: 2;
  column-gap: 40px;
}
.about-body p {
  margin: 0 0 16px;
  break-inside: avoid;
}
.about-body p:last-child { margin-bottom: 0; }
.about-body strong {
  font-weight: 500;
  color: var(--ink);
}
.about-body .brand {
  font-style: italic;
  color: var(--ink);
}
.about-stats {
  margin-top: 22px;
  display: flex;
  flex-wrap: wrap;
  gap: 18px 28px;
  font-family: 'Inter', sans-serif;
  break-inside: avoid;
  -webkit-column-break-before: always;
  break-before: column;
}
.about-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.about-stat-n {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
}
.about-stat-l {
  font-size: 10px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

/* ============================================================
   PRIMARY — Blog + Tracker as two big doors
   ============================================================ */
.primary-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 28px;
}
.primary-title {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 400;
  font-style: italic;
  font-size: 32px;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin: 0;
}
.primary-sub {
  font-size: 11px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.doors {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  margin-bottom: 56px;
}
.door {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 280px;
  padding: 32px 32px 28px;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  border-radius: 8px;
  text-decoration: none;
  color: var(--ink);
  overflow: hidden;
  transition: transform 0.45s cubic-bezier(.2,.7,.2,1), border-color 0.3s ease, background 0.3s ease;
  opacity: 0;
  transform: translateY(24px);
  will-change: transform;
}
.door.is-in {
  opacity: 1;
  transform: translateY(0);
}
.door:hover {
  border-color: rgba(212,166,74,0.45);
  background: #181410;
}
.door::before {
  content: '';
  position: absolute;
  inset: -2px;
  background: radial-gradient(280px 200px at var(--mx, 50%) var(--my, 50%), rgba(212,166,74,0.10), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.door:hover::before { opacity: 1; }
.door::after {
  content: '';
  position: absolute;
  left: 0; top: 0; height: 100%; width: 3px;
  background: var(--accent);
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.45s cubic-bezier(.2,.7,.2,1);
}
.door:hover::after, .door:focus-visible::after { transform: scaleY(1); }
.door-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
}
.door-kicker {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--accent);
}
.door-badge {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--bg);
  background: var(--accent);
  padding: 3px 9px;
  border-radius: 999px;
}
.door-badge.soft {
  color: var(--accent);
  background: transparent;
  border: 1px solid rgba(212,166,74,0.45);
}
.door-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(36px, 4.5vw, 52px);
  font-weight: 400;
  letter-spacing: -0.025em;
  line-height: 1.02;
  margin: 0 0 14px;
  color: var(--ink);
}
.door-desc {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.55;
  color: var(--muted);
  margin: 0 0 28px;
  max-width: 380px;
}
.door-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
  position: relative;
  z-index: 1;
}
.door-stat {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-family: 'Fraunces', Georgia, serif;
}
.door-stat-n {
  font-size: 26px;
  font-weight: 500;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.door-stat-l {
  font-family: 'Inter', sans-serif;
  font-size: 10.5px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.door-arrow {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px;
  color: var(--ink);
  transition: transform 0.35s cubic-bezier(.2,.7,.2,1), color 0.2s ease;
}
.door:hover .door-arrow {
  color: var(--accent);
  transform: translateX(8px);
}

/* ============================================================
   SOCIAL — secondary row
   ============================================================ */
.social-head {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 18px;
}
.social-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}
.social-rule {
  flex: 1;
  height: 1px;
  background: var(--rule);
}
.social {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 80px;
}
.soc {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  text-decoration: none;
  color: var(--ink-2);
  border: 1px solid var(--rule);
  border-radius: 6px;
  background: transparent;
  transition: border-color 0.25s ease, background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}
.soc:hover {
  border-color: rgba(212,166,74,0.5);
  background: var(--accent-soft);
  color: var(--ink);
  transform: translateY(-2px);
}
.soc-ic {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
.soc-ic svg { width: 100%; height: 100%; display: block; }
.soc-t {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.soc-name {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.2px;
  color: var(--ink);
}
.soc-meta {
  font-size: 10.5px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-top: 2px;
}

/* ============================================================
   COLOPHON
   ============================================================ */
.colophon {
  padding-top: 22px;
  border-top: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}
.colophon-left {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.2px;
}
.colophon-right {
  font-size: 11px;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--faint);
  font-weight: 500;
}

::selection { background: var(--accent); color: var(--bg); }

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
  border-radius: 4px;
}

/* ============================================================
   TABLET
   ============================================================ */
@media (max-width: 960px) {
  .page { padding: 24px 36px 64px; }
  .masthead { margin-bottom: 40px; }
  .hero { margin-bottom: 48px; }
  .name { margin-bottom: 24px; }
