# One-time: verify the service account as a Search Console OWNER (bypasses the
# "email not found" GSC bug). ADD THIS via GitHub web UI at:
#   .github/workflows/verify-owner.yml
# Then run it once: Actions -> Verify SA Owner -> Run workflow.
name: Verify SA Owner
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth requests
      - id: tok
        run: python blog/_tools/verify_owner.py gettoken
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
      - name: Commit token file
        run: |
          git config user.name "indexing-bot"
          git config user.email "indexing-bot@users.noreply.github.com"
          git add "${{ steps.tok.outputs.token_file }}"
          git commit -m "Add Google site-verification token"
          git push
      - name: Wait for GitHub Pages to serve the token
        run: |
          for i in $(seq 1 24); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "https://harshald13u.github.io/harshalfeatures/${{ steps.tok.outputs.token_file }}")
            echo "poll $i -> $code"
            [ "$code" = "200" ] && break
            sleep 15
          done
      - run: python blog/_tools/verify_owner.py verify
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
