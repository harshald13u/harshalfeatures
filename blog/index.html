<style>
:root {
 --bg: #0e0c0a;
 --bg-2: #15110d;
 --ink: #ece4d3;
 --ink-2: #c9c0ad;
 --muted: #8a8273;
 --faint: #807866;
 --rule: rgba(236,228,211,0.10);
 --rule-soft: rgba(236,228,211,0.06);
 --accent: #d4a64a;
 --accent-soft: rgba(212,166,74,0.08);
}
html[data-theme="light"] {
 --bg: #ebe5d7;
 --bg-2: #ddd4c1;
 --ink: #1a3458;
 --ink-2: #3a527a;
 --muted: #54687f;
 --faint: #5f7790;
 --rule: rgba(26, 52, 88, 0.14);
 --rule-soft: rgba(26, 52, 88, 0.07);
 --accent: #b8852b;
 --accent-soft: rgba(184,133,43,0.10);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: var(--bg); }
body {
 font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 background: var(--bg); color: var(--ink-2);
 min-height: 100vh; line-height: 1.55;
 font-feature-settings: "ss01", "cv11";
 -webkit-text-size-adjust: 100%; overflow-x: hidden;
}
body::before {
 content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
 background:
 radial-gradient(1200px 700px at 85% -10%, rgba(212,166,74,0.045), transparent 60%),
 radial-gradient(900px 600px at -5% 105%, rgba(212,166,74,0.025), transparent 60%);
}
a { color: inherit; text-decoration: none; }

.page {
 position: relative; z-index: 1;
 max-width: 1280px; margin: 0 auto;
 padding: max(26px, env(safe-area-inset-top)) max(48px, env(safe-area-inset-right)) 72px max(48px, env(safe-area-inset-left));
}

/* MASTHEAD, same as landing */
.masthead {
 display: grid; grid-template-columns: auto 1fr auto; align-items: center;
 gap: 18px;
 padding: max(12px, env(safe-area-inset-top)) 0 18px;
 border-bottom: 1px solid var(--rule);
 margin-bottom: 40px;
 /* Lock to top on scroll (all viewports). Solid theme bg fallback + glass
 blur when the browser supports backdrop-filter. */
 position: sticky;
 top: 0;
 z-index: 100;
 background: var(--bg);
}
@supports ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
 .masthead {
 background: rgba(14, 12, 10, 0.88);
 backdrop-filter: saturate(140%) blur(14px);
 -webkit-backdrop-filter: saturate(140%) blur(14px);
 }
 html[data-theme="light"] .masthead { background: rgba(235, 229, 215, 0.88); }
}
.mast-trail { justify-self: end; text-align: right; font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted); font-weight: 500; white-space: nowrap; }
.mast-trail a { color: var(--muted); transition: color 0.2s ease; }
.mast-trail a:hover { color: var(--accent); }
.mast-meta {
 justify-self: start;
 font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase;
 color: var(--muted); font-weight: 500;
}
.mast-meta a { color: var(--muted); transition: color 0.2s ease; }
.mast-meta a:hover { color: var(--accent); }

.mast-theme-toggle {
 display: inline-flex; align-items: center; justify-content: center;
 width: 32px; height: 32px; border-radius: 50%;
 background: rgba(255,255,255,0.04); border: 1px solid var(--rule);
 color: var(--ink-2); cursor: pointer; padding: 0; margin: 0;
 transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
 position: relative;
 justify-self: end;
}
.mast-theme-toggle::before { content: ""; position: absolute; inset: -6px; display: block; }
.mast-theme-toggle:hover { color: var(--accent); border-color: var(--accent); background: rgba(212,166,74,0.08); transform: translateY(-1px); }
.mast-theme-toggle .icon-sun.mast-theme-toggle .icon-moon { width: 15px; height: 15px; display: block; }
.mast-theme-toggle .icon-sun { display: none; }
html[data-theme="light"] .mast-theme-toggle .icon-sun { display: block; }
html[data-theme="light"] .mast-theme-toggle .icon-moon { display: none; }
html[data-theme="light"] .mast-theme-toggle { background: rgba(26,52,88,0.04); }

/* HERO */
.blog-hero { margin-bottom: 30px; text-align: center; }
.blog-title {
 font-family: 'Inter', sans-serif; font-weight: 800;
 font-size: clamp(44px, 5.6vw, 76px);
 line-height: 0.97; letter-spacing: -0.035em;
 margin: 0 0 16px; color: var(--ink);
}
.blog-sub {
 font-size: 15.5px; color: var(--ink-2); max-width: 620px;
 line-height: 1.5; margin: 0 auto;
}

/* TOPIC TABS */
.blog-tabs {
 display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
 margin: 26px 0 32px;
 padding-bottom: 22px; border-bottom: 1px solid var(--rule);
}
.blog-tabs a {
 display: inline-flex; align-items: center;
 padding: 9px 16px; border: 1px solid var(--rule);
 border-radius: 999px; font-size: 11px; font-weight: 600;
 letter-spacing: 1.3px; text-transform: uppercase;
 color: var(--ink-2); transition: all 0.2s ease; cursor: pointer;
}
.blog-tabs a:hover {
 color: var(--accent); border-color: var(--accent);
 background: rgba(212,166,74,0.08); transform: translateY(-1px);
}
.blog-tabs a.is-active {
 color: var(--bg); border-color: var(--accent);
 background: var(--accent); font-weight: 700;
}

/* GRID */
.posts-grid {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 20px;
}
.post-card {
 display: flex; flex-direction: column;
 background: var(--bg-2);
 border: 1px solid var(--rule);
 border-radius: 8px;
 overflow: hidden;
 transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}
.post-card:hover {
 transform: translateY(-3px);
 border-color: rgba(212,166,74,0.35);
 box-shadow: 0 18px 40px rgba(0,0,0,0.4);
}
.post-cover {
 aspect-ratio: 16/9;
 background: linear-gradient(135deg, #1a1612 0%, #2a201a 100%);
 position: relative; overflow: hidden;
}
.post-cover img {
 position: absolute; inset: 0;
 width: 100%; height: 100%; object-fit: cover;
 display: block;
 opacity: 1;
 transition: opacity 0.25s ease, transform 0.4s ease;
}
.post-cover .cover-light { opacity: 1; }
.post-cover .cover-dark { opacity: 0; }
html[data-theme="light"] .post-cover .cover-light { opacity: 0; }
html[data-theme="light"] .post-cover .cover-dark { opacity: 1; }
.post-card:hover .post-cover img { transform: scale(1.04); }
.post-cover-fallback {
 position: absolute; inset: 0;
 display: flex; align-items: center; justify-content: center;
 color: rgba(212,166,74,0.25);
 font-family: 'Inter', sans-serif; font-weight: 800;
 font-size: 64px; letter-spacing: -0.04em;
}
.post-body {
 padding: 18px 20px 20px;
 display: flex; flex-direction: column;
 flex: 1; gap: 10px;
}
.post-topic {
 font-size: 10px; font-weight: 700;
 letter-spacing: 1.4px; text-transform: uppercase;
 color: var(--accent);
}
.post-title {
 font-family: 'Inter', sans-serif; font-weight: 700;
 font-size: 18px; line-height: 1.28; letter-spacing: -0.015em;
 color: var(--ink); margin: 0;
}
.post-excerpt {
 font-size: 14px; line-height: 1.55; color: var(--ink-2);
 margin: 0;
 display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
 overflow: hidden;
}
.post-meta {
 margin-top: auto; padding-top: 14px;
 display: flex; justify-content: space-between; align-items: center;
 font-size: 11px; color: var(--muted);
 letter-spacing: 0.6px;
}
.post-meta .post-date { text-transform: uppercase; }
.post-meta .post-arrow { color: var(--accent); transition: transform 0.2s ease; }
.post-card:hover .post-arrow { transform: translateX(3px); }

/* EMPTY STATE */
.blog-empty {
 padding: 80px 32px;
 text-align: center;
 border: 1px dashed var(--rule);
 border-radius: 12px;
 background: rgba(21,17,13,0.5);
}
.blog-empty-title {
 font-family: 'Inter', sans-serif; font-weight: 700;
 font-size: 22px; color: var(--ink); margin: 0 0 8px;
 letter-spacing: -0.01em;
}
.blog-empty-sub {
 font-size: 14px; color: var(--ink-2); max-width: 420px; margin: 0 auto;
}

/* FOOTER */
.blog-footer {
 margin-top: 80px; padding-top: 28px;
 border-top: 1px solid var(--rule);
 display: flex; justify-content: space-between; align-items: center;
 font-size: 11px; color: var(--muted);
 letter-spacing: 0.4px;
}
.blog-footer a { color: var(--muted); transition: color 0.2s ease; }
.blog-footer a:hover { color: var(--accent); }

/* TABLET */
@media (max-width: 960px) {
 .page { padding: 24px 32px 64px; }
 .posts-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
}
/* MOBILE */
@media (max-width: 640px) {
 .page { padding: 18px 20px 52px; }
 .masthead { padding-bottom: 14px; margin-bottom: 32px; }
 .mast-trail { display: none; }
 .mast-meta { font-size: 9.5px; letter-spacing: 1.3px; }
 .blog-title { font-size: clamp(40px, 11vw, 60px); }
 .blog-sub { font-size: 15px; }
 .blog-tabs { gap: 6px; margin: 24px 0 28px; padding-bottom: 18px; }
 .blog-tabs a { padding: 8px 12px; font-size: 10px; letter-spacing: 1.1px; }
 .posts-grid { grid-template-columns: 1fr; gap: 14px; }
 .post-title { font-size: 17px; }
 .post-body { padding: 18px 18px 20px; }
}

/* "Harshal Dasani" name = always clickable home link (uniform across site) */
.name-home{color:inherit;text-decoration:none;border-bottom:1px solid transparent;transition:color .15s ease,border-color .15s ease}
.name-home:hover,.name-home:focus{color:var(--accent);border-bottom-color:var(--accent);text-decoration:none}
</style>

<script>
(function(){
 var TOPIC_LABELS = {
 "stock-market": "Stock Market",
 "commodities": "Commodities",
 "macros": "Macros",
 "geopolitics": "Geopolitics"
 };
 var url = new URL(window.location.href);
 var activeTopic = (url.searchParams.get('topic') || 'all').toLowerCase();
 if (!TOPIC_LABELS[activeTopic] && activeTopic !== 'all') activeTopic = 'all';

 // Highlight active tab
 document.querySelectorAll('.blog-tabs a').forEach(function(a){
 if ((a.getAttribute('data-topic') || '').toLowerCase() === activeTopic) {
 a.classList.add('is-active');
 }
 });

 // Topic tabs: replace history entry (don't stack) so Back returns to the home page, not the previous tab
 document.querySelectorAll('.blog-tabs a').forEach(function(a){
 a.addEventListener('click', function(e){
 e.preventDefault();
 var href = a.getAttribute('href');
 if (window.location.replace) { window.location.replace(href); } else { window.location.href = href; }
 });
 });

 function fmtDate(s){
 try {
 var d = new Date(s);
 if (isNaN(d)) return s;
 return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
 } catch(e) { return s; }
 }

 function escapeHTML(str){
 return String(str || '').replace(/[&<>"']/g, function(c){
 return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
 });
 }

 function postCardHTML(post){
 var slug = encodeURIComponent(post.slug || '');
 var img = post.image ? (
 post.darkImage ?
 '<img class="cover-light" src="'+escapeHTML(post.image)+'" alt="'+escapeHTML(post.title)+'" loading="lazy">' +
 '<img class="cover-dark" src="'+escapeHTML(post.darkImage)+'" alt="'+escapeHTML(post.title)+'" loading="lazy">' :
 (post.imageWebp ?
 '<picture><source srcset="'+escapeHTML(post.imageWebp)+'" type="image/webp"><img src="'+escapeHTML(post.image)+'" alt="'+escapeHTML(post.title)+'" loading="lazy"></picture>' :
 '<img src="'+escapeHTML(post.image)+'" alt="'+escapeHTML(post.title)+'" loading="lazy">'
 )
 ) : '<div class="post-cover-fallback">'+escapeHTML((post.title||'·').slice(0,1).toUpperCase())+'</div>';
 var topicLbl = TOPIC_LABELS[post.topic] || post.topic || '';
 return '<a class="post-card" href="posts/'+slug+'/">' +
 '<div class="post-cover">'+img+'</div>' +
 '<div class="post-body">' +
 '<div class="post-topic">'+escapeHTML(topicLbl)+'</div>' +
 '<h2 class="post-title">'+escapeHTML(post.title || 'Untitled')+'</h2>' +
 '<p class="post-excerpt">'+escapeHTML(post.excerpt || '')+'</p>' +
 '<div class="post-meta">' +
 '<span class="post-date">'+escapeHTML(fmtDate(post.date))+'</span>' +
 '<span class="post-arrow">Read &rarr;</span>' +
 '</div>' +
 '</div>' +
 '</a>';
 }

 fetch('posts.json?nc=' + Date.now())
 .then(function(r){ return r.json(); })
 .then(function(data){
 var posts = (data && data.posts) || [];
 // Sort: newest first by date
 posts.sort(function(a,b){
 return new Date(b.date||0) - new Date(a.date||0);
 });
 // Filter by topic
 if (activeTopic !== 'all') {
 posts = posts.filter(function(p){ return (p.topic||'').toLowerCase() === activeTopic; });
 }
 var grid = document.getElementById('postsGrid');
 if (!posts.length) {
 var label = activeTopic === 'all' ? 'No posts yet' : 'No posts on ' + (TOPIC_LABELS[activeTopic] || activeTopic) + ' yet';
 grid.innerHTML = '<div class="blog-empty"><h2 class="blog-empty-title">'+label+'</h2><p class="blog-empty-sub">Check back as I publish, new pieces drop here whenever I have something to say.</p></div>';
 return;
 }
 grid.innerHTML = posts.map(postCardHTML).join('');
 })
 .catch(function(){
 document.getElementById('postsGrid').innerHTML =
 '<div class="blog-empty"><h2 class="blog-empty-title">Couldn\u2019t load posts</h2><p class="blog-empty-sub">Refresh the page or check the manifest at <code>posts.json</code>.</p></div>';
 });
})();
</script>
<script>
function toggleBlogTheme(){
 var current = document.documentElement.getAttribute('data-theme') || 'dark';
 var next = current === 'light' ? 'dark' : 'light';
 document.documentElement.setAttribute('data-theme', next);
 try { localStorage.setItem('hd-theme', next); } catch(e) {}
}
</script>
