  # ---------------------------------------------------------------------------
# Monthly auto-updater for the FII / FPI Historical Flows tool.
#
# INSTALL (one-time): copy this file to  .github/workflows/update-fii-flows.yml
# in the repo (GitHub > Add file > Create new file > paste > Commit).
# It must live under .github/workflows/ to run. Then it updates itself monthly.
# You can also run it on demand: Actions tab > "Update FII/FPI flows" > Run workflow.
# ---------------------------------------------------------------------------
name: Update FII/FPI flows (monthly)

on:
  schedule:
    - cron: '0 2 2 * *'      # 02:00 UTC on the 2nd of every month (captures the month just ended)
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: fii-flows-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests beautifulsoup4 openpyxl
      - name: Fetch latest month & update data
        run: python3 tools/fii-flows/_updater/update_fii_flows.py
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain tools/fii-flows)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add tools/fii-flows/index.html tools/fii-flows/fii-flows-data.json tools/fii-flows/FII_FPI_Historical_Data_India.xlsx
            git commit -m "chore(fii-flows): monthly auto-update [skip ci]"
            git pull --rebase origin main || true
            git push
            echo "Pushed update."
          else
            echo "No new month — nothing to commit."
          fi
