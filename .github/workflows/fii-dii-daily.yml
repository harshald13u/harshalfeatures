name: FII/DII daily update
# Runs in the cloud on a fixed schedule — no PC, no Claude.
# Scrapes FII/DII (multi-source), updates the CSV, the website JSON, AND the Excel,
# then commits everything back so the site + Excel auto-update.
on:
  schedule:
    - cron: '30 15 * * 1-5'   # 15:30 UTC = 9:00 PM IST, Mon–Fri  (primary)
    - cron: '30 17 * * 1-5'   # 17:30 UTC = 11:00 PM IST, Mon–Fri (safety re-run; de-dupes)
  workflow_dispatch: {}         # manual "Run workflow" button in the Actions tab
permissions:
  contents: write
concurrency:
  group: fii-dii-daily
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install requests beautifulsoup4 openpyxl
      - run: python fii-dii/_tools/scrape_nse.py
      - name: Commit if data changed
        run: |
          git config user.name  "fii-dii-bot"
          git config user.email "actions@users.noreply.github.com"
          git add fii-dii/fii_dii_history.csv fii-dii/history.json fii-dii/FII_DII_History.xlsx
          if git diff --staged --quiet; then
            echo "No change today."
          else
            git commit -m "FII/DII auto-update $(date -u +%Y-%m-%d)"
            git push
          fi
