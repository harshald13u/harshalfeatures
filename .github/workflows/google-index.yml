name: Google Indexing
on:
  push:
    branches: [main]
    paths:
      - 'blog/posts/**'
      - 'blog/posts.json'
      - 'sitemap.xml'
      - 'news-sitemap.xml'
  workflow_dispatch: {}
jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-auth requests
      - run: python blog/_tools/google_index.py
        env:
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
